; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32@^6.12.0  ;esp32 core 2.0.17
board = esp32dev
framework = arduino

board_build.filesystem = littlefs # Use LittleFS filesystem upload file in data folder with task 'Upload Filesystem image'
board_build.partitions = min_spiffs.csv
monitor_speed = 115200

lib_deps = 
    lovyan03/LovyanGFX@^1.2.7
    lvgl/lvgl@^8.3.11
    electroniccats/MPU6050@^1.4.4

build_flags = 
    -D CORE_DEBUG_LEVEL=1
    -D LV_CONF_INCLUDE_SIMPLE
    -I src
    -I src/ui
    -I include

;CORE_DEBUG_LEVEL options:
;0: No output
;1: Errors only (default)
;2: Errors and warnings
;3: Errors, warnings, and info
;4: Errors, warnings, info, and debug
;5: All of the above plus verbose output
